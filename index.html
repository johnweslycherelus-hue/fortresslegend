<!-- ── STYLE POU ECON HUD ── (ranplase tout #econHUD ki deja egziste) -->
<style>
#econHUD {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 999;
  background: rgba(13,8,32,0.92);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 20px;
  min-width: 220px;
  box-shadow: 0 0 24px rgba(201,162,42,0.08), 0 0 60px rgba(201,162,42,0.03);
  backdrop-filter: blur(12px);
}
#econHUD .hud-title {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: .25em;
  color: var(--gold);
  margin-bottom: 12px;
  opacity: .7;
}
#econHUD .hud-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid rgba(123,47,190,.12);
}
#econHUD .hud-row:last-child {
  border-bottom: none;
}
#econHUD .hud-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: .12em;
  color: var(--muted);
}
#econHUD .hud-val {
  font-family: 'Share Tech Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: .05em;
  transition: all 0.4s ease;
}
#econHUD .hud-val.updated {
  color: #F0C84A !important;
  text-shadow: 0 0 8px rgba(240,200,74,0.6);
}
#econHUD .hud-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--green);
  margin-right: 8px;
  display: inline-block;
  animation: livePulse 2s ease-in-out infinite;
}
@media (max-width: 480px) {
  #econHUD {
    bottom: 12px;
    right: 12px;
    min-width: 180px;
    padding: 12px 14px;
  }
}
</style>

<!-- ── HTML POU HUD LA (kenbe menm jan ou genyen li deja) -->
<div id="econHUD">
  <div class="hud-title"><span class="hud-dot"></span>FORTRESS LEGEND ECONOMY</div>
  <div class="hud-row"><span class="hud-label">FLG BURNED TODAY</span><span class="hud-val" id="hud-burned">42,183</span></div>
  <div class="hud-row"><span class="hud-label">HEROES MINTED</span><span class="hud-val" id="hud-heroes">1,204</span></div>
  <div class="hud-row"><span class="hud-label">DUNGEONS CLEARED</span><span class="hud-val" id="hud-dungeons">8,991</span></div>
</div>

<!-- ── SCRIPT KOREKTE AK TOUT AMELYORASYON YO (ranplase dènye pati script ou a ak sa sa a) -->
<script>
// ... (kenbe tout lòt fonksyon ou yo: buildClassGrid, selectClass, doMint, buildDungeons, etc.)

// Fonksyon enterDungeon amelyore (ak renderHUD)
function enterDungeon() {
  if (!mintedHero || !selDungeon || dungeonRunning) return;

  if (flg < selDungeon.entry) {
    alert(`Ou bezwen ${selDungeon.entry} $FLG pou antre nan ${selDungeon.name} !`);
    return;
  }

  if (selDungeon.entry > 0) {
    saveFLG(flg - selDungeon.entry);
    hudBurned += selDungeon.entry;
    renderHUD();  // Mizajou imedyatman san simulation
  }

  dungeonRunning = true;
  buildEnterBtn();

  const box = document.getElementById('logBox');
  box.innerHTML = '';

  selDungeon.logs.forEach((log, i) => {
    setTimeout(() => {
      const line = document.createElement('div');
      line.className = 'log-line';
      line.innerHTML = `<span style="color:#333;margin-right:8px">[${String(i).padStart(2,'0')}]</span>${log}`;
      box.appendChild(line);
      box.scrollTop = box.scrollHeight;

      if (i === selDungeon.logs.length - 1) {
        const reward = Math.floor(Math.random() * (selDungeon.max - selDungeon.min + 1)) + selDungeon.min;
        setTimeout(() => {
          saveFLG(flg + reward);
          hudDungeons++;
          renderHUD();

          const res = document.createElement('div');
          res.className = 'log-result';
          res.innerHTML = `
            <div style="color:var(--green);font-size:13px;font-family:'Cinzel',serif;font-weight:700">✨ REWARDS DISTRIBUTED ON-CHAIN</div>
            <div style="color:var(--gold);margin-top:4px">+${reward.toLocaleString()} $FLG ajoute nan balans ou</div>
          `;
          box.appendChild(res);
          box.scrollTop = box.scrollHeight;

          dungeonRunning = false;
          buildEnterBtn();
        }, 600);
      }
    }, i * 620);
  });
}

// ── ECONOMY HUD ── (tout ansanm ak localStorage + flash)
let hudBurned = parseInt(localStorage.getItem('flgBurned') || '42183', 10);
let hudHeroes = parseInt(localStorage.getItem('flgHeroes') || '1204', 10);
let hudDungeons = parseInt(localStorage.getItem('flgDungeons') || '8991', 10);

function renderHUD() {
  const burnedEl = document.getElementById('hud-burned');
  const heroesEl = document.getElementById('hud-heroes');
  const dungeonsEl = document.getElementById('hud-dungeons');

  if (burnedEl) {
    burnedEl.textContent = hudBurned.toLocaleString();
    flash(burnedEl);
  }
  if (heroesEl) {
    heroesEl.textContent = hudHeroes.toLocaleString();
    flash(heroesEl);
  }
  if (dungeonsEl) {
    dungeonsEl.textContent = hudDungeons.toLocaleString();
    flash(dungeonsEl);
  }

  // Save nan localStorage pou pwochen fwa
  localStorage.setItem('flgBurned', hudBurned);
  localStorage.setItem('flgHeroes', hudHeroes);
  localStorage.setItem('flgDungeons', hudDungeons);
}

function flash(el) {
  el.classList.add('updated');
  setTimeout(() => el.classList.remove('updated'), 400);
}

function simulateEconomy() {
  hudBurned += Math.floor(Math.random() * 12 + 3);
  if (Math.random() > 0.92) hudHeroes += 1;
  if (Math.random() > 0.85) hudDungeons += 1;
  renderHUD();
}

setInterval(simulateEconomy, 3000);
renderHUD();  // Premye afichaj imedyatman

// ... (si gen lòt script apre sa, kenbe yo)
</script>
